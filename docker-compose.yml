version: '3.8'

services:
  mongodb:
    image: docker.io/library/mongo:7.0
    container_name: finance-mongodb
    command: ["--config", "/etc/mongod.conf", "--nojournal", "--wiredTigerCacheSizeGB=0.2", "--maxConns=50"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongod.conf:/etc/mongod.conf:ro
    deploy:
      resources:
        limits:
          memory: 384M
    tmpfs:
      - /tmp:size=64M
    restart: always

  backend:
    build:
      context: ./backend
    container_name: finance-backend
    ports:
      - "5001:5001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/finance
      - PORT=5001
      - NODE_OPTIONS=--max-old-space-size=192
    depends_on:
      - mongodb
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: finance-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
    restart: always

volumes:
  mongo-data:

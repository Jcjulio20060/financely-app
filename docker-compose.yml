version: '3.8'

services:
  mongodb:
    image: docker.io/library/mongo:7.0
    container_name: finance-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
    container_name: finance-backend
    ports:
      - "5001:5001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/finance
      - PORT=5001
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: finance-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data:
